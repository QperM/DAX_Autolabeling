apiVersion: apps/v1
kind: Deployment
metadata:
  name: dax-api
  namespace: dax-autolabeling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dax-api
  template:
    metadata:
      labels:
        app: dax-api
    spec:
      containers:
        - name: api
          image: <registry>/<repo>/dax-api:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dax-secrets
                  key: sessionSecret
            - name: GROUNDED_SAM2_API_URL
              value: "http://dax-sam2:7860/api/auto-label"
          volumeMounts:
            - name: uploads
              mountPath: /app/server/uploads
            - name: sqlite
              mountPath: /app/database
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "0.5"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: dax-uploads-pvc
        - name: sqlite
          persistentVolumeClaim:
            claimName: dax-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dax-api
  namespace: dax-autolabeling
spec:
  selector:
    app: dax-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001

