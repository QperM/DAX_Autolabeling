apiVersion: apps/v1
kind: Deployment
metadata:
  name: dax-depthrepair
  namespace: dax-autolabeling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dax-depthrepair
  template:
    metadata:
      labels:
        app: dax-depthrepair
    spec:
      containers:
        - name: depthrepair
          # TODO: replace with your pushed image
          image: registry.daxrobotics.cn/auto-labeling-tool/dax-depthrepair:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7870
          env:
            - name: DATA_ROOT
              value: "/app"
            - name: DEPTHREPAIR_PORT
              value: "7870"
            - name: DEPTHREPAIR_DEVICE
              value: "cuda"
            - name: CUDA_DEVICE_ORDER
              value: PCI_BUS_ID
          readinessProbe:
            httpGet:
              path: /health
              port: 7870
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7870
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: dax-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dax-depthrepair
  namespace: dax-autolabeling
spec:
  selector:
    app: dax-depthrepair
  ports:
    - name: http
      port: 7870
      targetPort: 7870

