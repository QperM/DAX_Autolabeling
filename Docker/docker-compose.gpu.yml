# GPU images reuse dax-cuda-base:12.1 (see Docker/Dockerfile.cuda-base.gpu). Build it once from repo root:
#   docker build -f Docker/Dockerfile.cuda-base.gpu -t dax-cuda-base:12.1 .
#
# pull_policy: never — use locally tagged :local images; do not try docker.io pulls (avoids pointless "Pulling" / hub lookups).

name: dax-autolabeling

services:
  sam2:
    image: ${SAM2_IMAGE:-dax-sam2:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: Docker/Dockerfile.sam2.gpu
    ports:
      # Host port is customizable; container listens on 7860.
      - "${SAM2_HOST_PORT:-37860}:7860"
    # Local Docker Compose GPU enablement.
    # NOTE: `deploy.resources.reservations.devices` is Swarm-oriented and is commonly ignored by local compose.
    # `gpus: all` works with Docker Desktop + NVIDIA Container Toolkit (or Linux Docker + nvidia-container-toolkit).
    gpus: all
    environment:
      SAM2_CHECKPOINT: ${SAM2_CHECKPOINT:-/sam2-assets/checkpoints/sam2_hiera_large.pt}
      # SAM2_MODEL_CFG 使用 Hydra 配置名（不是磁盘路径）
      SAM2_MODEL_CFG: ${SAM2_MODEL_CFG:-configs/sam2/sam2_hiera_l.yaml}
      # Make CUDA device selection stable & explicit (prevents "sometimes GPU0/GPU1" confusion across hosts).
      # - CUDA_DEVICE_ORDER=PCI_BUS_ID makes device indexing stable.
      # - CUDA_VISIBLE_DEVICES=0 pins the container to the first visible NVIDIA GPU.
      CUDA_DEVICE_ORDER: ${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      # NVIDIA runtime hints (works when NVIDIA Container Toolkit is installed)
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

  pose:
    image: ${POSE_IMAGE:-dax-pose:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: Docker/Dockerfile.pose.gpu
    ports:
      - "${POSE_HOST_PORT:-7900}:7900"
    gpus: all
    environment:
      DATA_ROOT: /app
      POSE_SERVICE_PORT: "7900"
      CUDA_DEVICE_ORDER: ${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../dax-autolabel-data/uploads:/app/uploads:rw
    depends_on:
      - sam2

  depthrepair:
    image: ${DEPTHREPAIR_IMAGE:-dax-depthrepair:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: Docker/Dockerfile.depthrepair.gpu
    ports:
      - "${DEPTHREPAIR_HOST_PORT:-7870}:7870"
    gpus: all
    environment:
      DATA_ROOT: /app
      DEPTHREPAIR_PORT: "7870"
      DEPTHREPAIR_DEVICE: cuda
      CUDA_DEVICE_ORDER: ${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../dax-autolabel-data/uploads:/app/uploads:rw
    depends_on:
      - sam2

  api:
    image: ${API_IMAGE:-dax-api:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: Docker/Dockerfile.api
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      SESSION_SECRET: ${SESSION_SECRET:-CHANGE_ME}
      GROUNDED_SAM2_API_URL: ${GROUNDED_SAM2_API_URL:-http://sam2:7860/api/auto-label}
      DATA_ROOT: /app
      POSE_SERVICE_URL: ${POSE_SERVICE_URL:-http://pose:7900}
      DEPTH_REPAIR_SERVICE_URL: ${DEPTH_REPAIR_SERVICE_URL:-http://depthrepair:7870}
    depends_on:
      - sam2
      - pose
      - depthrepair
    volumes:
      - ../dax-autolabel-data/uploads:/app/uploads:rw
      - ../dax-autolabel-data/database:/app/database:rw
    networks:
      default:
        aliases:
          - dax-api

  web:
    image: ${WEB_IMAGE:-dax-web:local}
    pull_policy: never
    build:
      context: ..
      dockerfile: Docker/Dockerfile.web
    ports:
      - "${WEB_HOST_PORT:-38080}:80"
    depends_on:
      - api


