name: dax-autolabeling-web-api

services:
  api:
    image: ${API_IMAGE:-dax-api:local}
    build:
      context: ..
      dockerfile: Docker/Dockerfile.api
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      SESSION_SECRET: ${SESSION_SECRET:-CHANGE_ME}
      # 如需对接已有的 SAM2 服务，可在部署时通过环境变量覆盖此地址
      GROUNDED_SAM2_API_URL: ${GROUNDED_SAM2_API_URL:-http://sam2:7860/api/auto-label}
    volumes:
      - ./data/uploads:/app/server/uploads:rw
      - ./data/database:/app/database:rw
    networks:
      default:
        aliases:
          - dax-api

  web:
    image: ${WEB_IMAGE:-dax-web:local}
    build:
      context: ..
      dockerfile: Docker/Dockerfile.web
    ports:
      - "${WEB_HOST_PORT:-38080}:80"
    depends_on:
      - api

